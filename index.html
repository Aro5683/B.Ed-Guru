<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B.Ed Guru</title>

  <!-- PWA Manifest & Theme Colors -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1e3a8a">

  <!-- External Fonts & Icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: #e0f2fe;
      color: #1e293b;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: #ffffff;
      width: 100%;
      max-width: 420px;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(30, 58, 138, 0.15);
      text-align: center;
    }

    .logo-icon {
      font-size: 50px;
      color: #1e3a8a;
      margin-bottom: 15px;
    }

    h1 {
      font-size: 24px;
      color: #1e3a8a;
      margin-bottom: 8px;
    }

    p {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 20px;
      line-height: 1.5;
    }

    .btn {
      width: 100%;
      background-color: #1e3a8a;
      color: #ffffff;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.2s ease;
    }

    .btn:hover {
      background-color: #1d4ed8;
    }

    .input-group {
      text-align: left;
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 5px;
      color: #334155;
    }

    .input-group input {
      width: 100%;
      padding: 12px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    .input-group input:focus {
      border-color: #1e3a8a;
    }

    .alert-box {
      background-color: #fee2e2;
      border-left: 4px solid #ef4444;
      color: #991b1b;
      padding: 12px;
      font-size: 13px;
      border-radius: 4px;
      margin-bottom: 20px;
      text-align: left;
    }
  </style>
</head>
<body>

  <div class="card">
    <i class="fa-solid fa-graduation-cap logo-icon"></i>

    <!-- ========================================================= -->
    <!-- BROWSER VIEW (Locks Registration, Forces App Installation)  -->
    <!-- ========================================================= -->
    <div id="browser-view" style="display: none;">
      <h1>B.Ed Guru</h1>
      <p>Smart Mobile App Platform for B.Ed Students</p>

      <div class="alert-box">
        <i class="fa-solid fa-lock"></i> <strong>Registration Blocked:</strong><br>
        Registration and study materials are only accessible inside the official installed mobile app.
      </div>

      <button id="install-btn" class="btn">
        <i class="fa-solid fa-download"></i> Install B.Ed Guru App
      </button>
    </div>


    <!-- ========================================================= -->
    <!-- INSTALLED PWA VIEW (Allows Registration and App Access)   -->
    <!-- ========================================================= -->
    <div id="pwa-view" style="display: none;">
      <h1>Student Register</h1>
      <p>Create your B.Ed Guru account to continue</p>

      <form id="register-form" onsubmit="handleRegistration(event)">
        <div class="input-group">
          <label>Full Name</label>
          <input type="text" placeholder="Enter full name" required>
        </div>

        <div class="input-group">
          <label>Email Address</label>
          <input type="email" placeholder="Enter email address" required>
        </div>

        <div class="input-group">
          <label>Password</label>
          <input type="password" placeholder="Create password" required>
        </div>

        <button type="submit" class="btn">
          <i class="fa-solid fa-user-plus"></i> Register & Enter
        </button>
      </form>
    </div>
  </div>

  <script>
    // 1. Register Service Worker (sw.js)
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('[SW] Service Worker Registered'))
          .catch(err => console.error('[SW] Registration Failed:', err));
      });
    }

    // 2. Check if running inside installed standalone PWA
    function isAppInstalled() {
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
      const isiOSStandalone = window.navigator.standalone === true;
      return isStandalone || isiOSStandalone;
    }

    // 3. Switch screens based on environment
    window.addEventListener('DOMContentLoaded', () => {
      if (isAppInstalled()) {
        // User is INSIDE the app -> Show Registration Screen
        document.getElementById('pwa-view').style.display = 'block';
        document.getElementById('browser-view').style.display = 'none';
      } else {
        // User is in WEBBROWSER -> Show Lock Screen
        document.getElementById('browser-view').style.display = 'block';
        document.getElementById('pwa-view').style.display = 'none';
      }
    });

    // 4. Handle PWA Installation Trigger
    let installPromptEvent;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      installPromptEvent = e;
    });

    document.getElementById('install-btn').addEventListener('click', async () => {
      if (installPromptEvent) {
        installPromptEvent.prompt();
        const { outcome } = await installPromptEvent.userChoice;
        if (outcome === 'accepted') {
          console.log('User installed B.Ed Guru');
        }
        installPromptEvent = null;
      } else {
        alert('To install B.Ed Guru:\n1. Tap browser menu (⋮ or Share)\n2. Select "Add to Home Screen" or "Install App".');
      }
    });

    // 5. Handle Registration Submit
    function handleRegistration(e) {
      e.preventDefault();
      alert('Welcome to B.Ed Guru! Registration Successful.');
    }
  </script>

</body>
</html>
