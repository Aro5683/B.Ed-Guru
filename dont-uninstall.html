<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Emotional Retention Modal</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121212;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    /* Trigger Button inside App Settings */
    .danger-btn {
      background: #ff4d4d;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    /* Modal Backdrop */
    .modal-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(5px);
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    /* Emotional Card */
    .modal-card {
      background: #1e1e1e;
      border: 1px solid #333;
      padding: 30px;
      border-radius: 20px;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      transform: scale(0.8);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .modal-overlay.active .modal-card {
      transform: scale(1);
    }

    .emoji {
      font-size: 50px;
      margin-bottom: 10px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.1); }
      100% { transform: scale(1); }
    }

    h2 {
      margin-top: 0;
      color: #ff6b6b;
    }

    p {
      color: #ccc;
      line-height: 1.5;
      font-size: 15px;
    }

    .btn-group {
      margin-top: 25px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* Stay Button (Big & Prominent) */
    .btn-stay {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #000;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    /* Leave Button (Small & Subtle) */
    .btn-leave {
      background: transparent;
      color: #888;
      border: none;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
      text-decoration: underline;
    }

    .btn-leave:hover {
      color: #ff4d4d;
    }
  </style>
</head>
<body>

  <!-- Example Setting Option -->
  <button class="danger-btn" onclick="openBreakupModal()">Delete App Account</button>

  <!-- Emotional Popup -->
  <div class="modal-overlay" id="breakupModal">
    <div class="modal-card">
      <div class="emoji">💔</div>
      <h2>Are you really ending our bond?</h2>
      <p>
        Is this really the end? After all the good times, memories, and progress we made together... 🥺
        <br><br>
        If you leave now, all your custom data will be gone forever. Don't let us become just strangers with memories!
      </p>

      <div class="btn-group">
        <button class="btn-stay" onclick="stayTogether()">
          No, I can't leave you! ❤️
        </button>
        <button class="btn-leave" onclick="confirmBreakup()">
          Yes, break my heart and uninstall...
        </button>
      </div>
    </div>
  </div>

  <script>
    function openBreakupModal() {
      document.getElementById('breakupModal').classList.add('active');
    }

    function stayTogether() {
      document.getElementById('breakupModal').classList.remove('active');
      alert("I knew you loved me! Welcome back 🥰");
    }

    function confirmBreakup() {
      alert("Goodbye... I'll miss you 😭");
      // Trigger actual delete or logout API here
      document.getElementById('breakupModal').classList.remove('active');
    }
  </script>

</body>
</html>
